<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ritesh Patil Research — Independent Equity Research | Financial Markets | Long-Term Investing</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

  :root {
    --navy-deep:   #0a1628;
    --navy-panel:  #0f1f38;
    --navy-glass:  rgba(20, 36, 64, 0.55);
    --navy-border: #1d3354;
    --gold:        #c9a44c;
    --gold-soft:   #e3c878;
    --gold-dim:    rgba(201, 164, 76, 0.18);
    --ivory:       #ece7da;
    --ivory-dim:   #9aa6bc;
    --green:       #4ade80;
    --red:         #f87171;

    --display: 'Fraunces', serif;
    --body: 'Inter', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--navy-deep);
    color: var(--ivory);
    font-family: var(--body);
    overflow-x: hidden;
    position: relative;
  }

  /* ───────── Ambient chart-line background signature ───────── */
  .chart-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    opacity: 0.16;
    pointer-events: none;
  }
  .chart-bg svg { width: 100%; height: 100%; }
  .chart-line {
    fill: none;
    stroke: var(--gold);
    stroke-width: 1.4;
    stroke-dasharray: 4000;
    stroke-dashoffset: 4000;
    animation: drawLine 4.5s ease-out forwards;
  }
  .chart-line.delay {
    stroke: var(--ivory-dim);
    stroke-width: 1;
    animation-delay: 0.4s;
    opacity: 0.6;
  }
  @keyframes drawLine {
    to { stroke-dashoffset: 0; }
  }

  /* ───────── Nav ───────── */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 48px;
    background: rgba(10, 22, 40, 0.78);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--navy-border);
  }
  .nav-mark {
    font-family: var(--display);
    font-size: 21px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .nav-mark .dot { color: var(--gold); }
  .nav-links {
    display: flex;
    gap: 38px;
    list-style: none;
  }
  .nav-links a {
    color: var(--ivory-dim);
    text-decoration: none;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 500;
    transition: color 0.25s;
    position: relative;
  }
  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: -6px; left: 0;
    width: 0; height: 1px;
    background: var(--gold);
    transition: width 0.3s;
  }
  .nav-links a:hover { color: var(--ivory); }
  .nav-links a:hover::after { width: 100%; }

  /* ───────── Hero ───────── */
  .hero {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 0.85fr 1.15fr;
    gap: 60px;
    padding: 90px 48px 110px;
    max-width: 1360px;
    margin: 0 auto;
    align-items: center;
  }

  .hero-photo-wrap {
    position: relative;
  }
  .hero-photo-frame {
    position: relative;
    border-radius: 4px;
    overflow: hidden;
    aspect-ratio: 4 / 5;
    background: linear-gradient(160deg, var(--navy-panel), var(--navy-deep));
    border: 1px solid var(--navy-border);
  }
  .hero-photo-frame::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg, transparent 60%, rgba(10,22,40,0.85) 100%);
    z-index: 2;
  }
  .photo-placeholder {
    position: absolute; inset: 0;
    display: grid; place-items: center;
    color: var(--navy-border);
    font-family: var(--display);
    font-size: 15px;
    text-align: center;
    padding: 30px;
    line-height: 1.6;
  }
  .photo-placeholder span { display: block; color: var(--gold); font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 10px; font-family: var(--body); }
  .hero-photo-frame img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .frame-corner {
    position: absolute;
    width: 28px; height: 28px;
    border: 1.5px solid var(--gold);
    z-index: 3;
  }
  .frame-corner.tl { top: -1px; left: -1px; border-right: none; border-bottom: none; }
  .frame-corner.br { bottom: -1px; right: -1px; border-left: none; border-top: none; }

  .photo-caption {
    margin-top: 18px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ivory-dim);
    letter-spacing: 0.5px;
  }
  .photo-caption .live { color: var(--green); display: flex; align-items: center; gap: 6px; }
  .live-pulse {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    animation: pulse 1.8s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

  .hero-content .eyebrow {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 22px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .eyebrow::before {
    content: '';
    width: 32px; height: 1px;
    background: var(--gold);
  }

  .hero-content h1 {
    font-family: var(--display);
    font-size: clamp(38px, 4.6vw, 60px);
    font-weight: 500;
    line-height: 1.08;
    letter-spacing: -0.5px;
    margin-bottom: 24px;
  }
  .hero-content h1 em {
    font-style: italic;
    font-weight: 400;
    color: var(--gold-soft);
  }

  .hero-content .lede {
    font-size: 16.5px;
    line-height: 1.75;
    color: var(--ivory-dim);
    max-width: 540px;
    margin-bottom: 38px;
  }

  .hero-cta {
    display: flex;
    gap: 16px;
    margin-bottom: 56px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 14px 28px;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 600;
    border-radius: 2px;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    transition: all 0.3s;
    border: 1px solid transparent;
  }
  .btn-primary {
    background: var(--gold);
    color: var(--navy-deep);
  }
  .btn-primary:hover {
    background: var(--gold-soft);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(201,164,76,0.25);
  }
  .btn-ghost {
    border-color: var(--navy-border);
    color: var(--ivory);
    background: transparent;
  }
  .btn-ghost:hover {
    border-color: var(--gold);
    color: var(--gold-soft);
  }

  /* ───────── Section shared ───────── */
  section {
    position: relative;
    z-index: 1;
    max-width: 1360px;
    margin: 0 auto;
    padding: 90px 48px;
  }
  .section-head {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 52px;
    flex-wrap: wrap;
    gap: 16px;
  }
  .section-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 14px;
  }
  .section-title {
    font-family: var(--display);
    font-size: clamp(28px, 3vw, 38px);
    font-weight: 500;
    letter-spacing: -0.3px;
  }
  .section-sub {
    color: var(--ivory-dim);
    font-size: 14.5px;
    max-width: 360px;
    line-height: 1.6;
    text-align: right;
  }

  /* ───────── Glass card base ───────── */
  .glass {
    background: var(--navy-glass);
    backdrop-filter: blur(14px);
    border: 1px solid var(--navy-border);
    border-radius: 6px;
  }

  /* ───────── Timeline ───────── */
  .timeline {
    position: relative;
    padding-left: 40px;
  }
  .timeline::before {
    content: '';
    position: absolute;
    left: 0; top: 8px; bottom: 8px;
    width: 1px;
    background: linear-gradient(180deg, var(--gold) 0%, var(--navy-border) 100%);
  }
  .timeline-item {
    position: relative;
    padding-bottom: 52px;
  }
  .timeline-item:last-child { padding-bottom: 0; }
  .timeline-dot {
    position: absolute;
    left: -45px; top: 4px;
    width: 11px; height: 11px;
    border-radius: 50%;
    background: var(--navy-deep);
    border: 2px solid var(--gold);
  }
  .timeline-year {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--gold);
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .timeline-role {
    font-family: var(--display);
    font-size: 21px;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .timeline-org {
    font-size: 13px;
    color: var(--ivory-dim);
    margin-bottom: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .timeline-desc {
    font-size: 14.5px;
    line-height: 1.7;
    color: var(--ivory-dim);
    max-width: 600px;
  }

  /* ───────── About ───────── */
  .about-card {
    padding: 40px 44px;
    margin-bottom: 36px;
  }
  .about-text {
    font-size: 15.5px;
    line-height: 1.8;
    color: var(--ivory-dim);
    max-width: 760px;
  }
  .about-text + .about-text { margin-top: 18px; }

  /* ───────── Expertise cards ───────── */
  .skills-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 18px;
  }
  .expertise-card {
    padding: 30px 28px;
  }
  .expertise-card-title {
    font-family: var(--display);
    font-size: 19px;
    font-weight: 500;
    color: var(--ivory);
    margin-bottom: 12px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--navy-border);
  }
  .expertise-card-desc {
    font-size: 14px;
    line-height: 1.7;
    color: var(--ivory-dim);
  }

  /* ───────── Latest Research cards ───────── */
  .research-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
  }
  .research-card {
    padding: 32px 28px;
    position: relative;
    overflow: hidden;
  }
  .research-card-empty {
    display: flex;
    flex-direction: column;
    min-height: 180px;
  }
  .research-card-tag {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 18px;
  }
  .research-card-title {
    font-family: var(--display);
    font-size: 19px;
    font-weight: 500;
    color: var(--ivory);
    margin-bottom: 10px;
  }
  .research-card-desc {
    font-size: 13.5px;
    line-height: 1.65;
    color: var(--ivory-dim);
    margin-top: auto;
  }

  /* ───────── Research Library grid ───────── */
  .library-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
  .library-tile {
    padding: 28px 20px;
    text-align: center;
    font-family: var(--display);
    font-size: 16px;
    font-weight: 500;
    color: var(--ivory);
    transition: border-color 0.3s, transform 0.3s;
  }
  .library-tile:hover {
    border-color: var(--gold);
    transform: translateY(-3px);
  }

  /* ───────── LinkedIn / contact strip ───────── */
  .contact-section {
    text-align: center;
  }
  .contact-card {
    padding: 70px 48px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .contact-card::before {
    content: '';
    position: absolute;
    top: -50%; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, var(--gold-dim) 0%, transparent 70%);
    pointer-events: none;
  }
  .contact-title {
    font-family: var(--display);
    font-size: clamp(28px, 3.5vw, 42px);
    font-weight: 500;
    margin-bottom: 18px;
    position: relative;
  }
  .contact-sub {
    color: var(--ivory-dim);
    font-size: 15px;
    max-width: 480px;
    margin: 0 auto 36px;
    line-height: 1.7;
    position: relative;
  }
  .contact-actions {
    display: flex;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
    position: relative;
  }
  .btn-linkedin {
    background: transparent;
    border: 1px solid var(--navy-border);
    color: var(--ivory);
    padding: 14px 28px;
    border-radius: 2px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 600;
    transition: all 0.3s;
  }
  .btn-linkedin:hover {
    border-color: #0a66c2;
    color: #4d9fe8;
  }
  .btn-linkedin svg { width: 16px; height: 16px; }

  /* ───────── Footer ───────── */
  footer {
    border-top: 1px solid var(--navy-border);
    padding: 36px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--ivory-dim);
    max-width: 1360px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
    flex-wrap: wrap;
    gap: 12px;
  }
  footer .foot-mono { font-family: var(--mono); letter-spacing: 0.5px; }

  /* ───────── Scroll reveal ───────── */
  .reveal {
    opacity: 1;
    transform: none;
  }
  .reveal.animate-in {
    animation: revealIn 0.8s ease both;
  }
  @keyframes revealIn {
    from { opacity: 0; transform: translateY(28px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ───────── Responsive ───────── */
  @media (max-width: 980px) {
    .hero { grid-template-columns: 1fr; padding-top: 50px; }
    .hero-photo-wrap { max-width: 320px; margin: 0 auto; }
    .skills-grid { grid-template-columns: 1fr; }
    .research-grid { grid-template-columns: 1fr; }
    .library-grid { grid-template-columns: repeat(2, 1fr); }
    .nav-links { display: none; }
    section { padding: 60px 24px; }
    .hero { padding: 50px 24px 70px; }
    .section-head { flex-direction: column; align-items: flex-start; }
    .section-sub { text-align: left; }
  }
  @media (max-width: 560px) {
    nav { padding: 18px 20px; }
    .contact-card { padding: 50px 24px; }
    .about-card { padding: 28px 24px; }
    .library-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
